<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="svbGrad" x1="600" y1="0" x2="600" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172436" />
      <stop offset="0.8" stop-color="#172436" />
      <stop offset="1" stop-color="#2d4718" />
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#svbGrad)" />

  <!-- Melting Grid -->
  <g opacity="0.4">
    <path d="M0 100 H1200" stroke="#a4ff00" stroke-width="0.5" />
    <path d="M0 200 H1200" stroke="#a4ff00" stroke-width="0.5" />
    <path d="M0 300 H1200" stroke="#a4ff00" stroke-width="0.5" stroke-dasharray="10 20" />
    <path d="M0 400 C300 400 300 550 600 550 C900 550 900 400 1200 400" stroke="#a4ff00" stroke-width="1" />
    
    <path d="M200 0 V600" stroke="#a4ff00" stroke-width="0.5" />
    <path d="M400 0 V600" stroke="#a4ff00" stroke-width="0.5" />
    <path d="M600 0 V600" stroke="#a4ff00" stroke-width="0.5" />
    <path d="M800 0 V600" stroke="#a4ff00" stroke-width="0.5" />
    <path d="M1000 0 V600" stroke="#a4ff00" stroke-width="0.5" />
  </g>

  <!-- Falling currency/data bits -->
  <g>
    <rect x="300" y="450" width="10" height="30" fill="#a4ff00" opacity="0.8" />
    <rect x="580" y="520" width="10" height="40" fill="#a4ff00" opacity="0.6" />
    <rect x="900" y="420" width="10" height="20" fill="#a4ff00" opacity="0.9" />
    <circle cx="450" cy="500" r="4" fill="#a4ff00" opacity="0.7" />
    <circle cx="750" cy="540" r="3" fill="#a4ff00" opacity="0.5" />
  </g>

  <!-- Central instability -->
  <path d="M400 300 Q600 500 800 300" stroke="#a4ff00" stroke-width="2" opacity="0.8" />
  <path d="M450 350 Q600 550 750 350" stroke="#a4ff00" stroke-width="1" opacity="0.4" />

  <rect width="1200" height="600" filter="url(#grain)" opacity="0.4" pointer-events="none" />
</svg>

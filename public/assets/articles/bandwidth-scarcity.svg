<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.1" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="#172436" />

  <!-- The Bottleneck -->
  <g transform="translate(600, 300)">
    <path d="M-400 -50 C-200 -50 -100 -20 0 -20 C100 -20 200 -50 400 -50" stroke="#a4ff00" stroke-width="2" opacity="0.4" />
    <path d="M-400 50 C-200 50 -100 20 0 20 C100 20 200 50 400 50" stroke="#a4ff00" stroke-width="2" opacity="0.4" />

    <!-- Data Flood -->
    <g opacity="0.3">
      <circle cx="-350" cy="-20" r="4" fill="#a4ff00" />
      <circle cx="-320" cy="10" r="3" fill="#a4ff00" />
      <circle cx="-380" cy="30" r="2" fill="#a4ff00" />
      <circle cx="-300" cy="-10" r="5" fill="#a4ff00" />
    </circle>
    
    <!-- Concentrated Essence -->
    <g transform="translate(0, 0)">
       <path d="M0 -20 L10 -40 L0 -60 L-10 -40 Z" fill="#a4ff00" />
       <path d="M0 0 L15 -20 L0 -40 L-15 -20 Z" fill="#a4ff00" opacity="0.6" />
       <rect x="-1" y="0" width="2" height="40" fill="#a4ff00" opacity="0.4" />
    </g>
  </g>

  <rect width="1200" height="600" filter="url(#grain)" opacity="0.2" pointer-events="none" />
</svg>

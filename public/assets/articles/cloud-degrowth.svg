<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.1" />
      </feComponentTransfer>
    </filter>
    <radialGradient id="cloudGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(600 250) rotate(90) scale(400 600)">
      <stop stop-color="#a4ff00" stop-opacity="0.15" />
      <stop offset="1" stop-color="#172436" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="600" fill="#172436" />
  
  <rect width="1200" height="600" fill="url(#cloudGlow)" />

  <!-- Abstract Cloud Particles -->
  <g opacity="0.4">
    <circle cx="400" cy="200" r="80" fill="#f4efe7" opacity="0.1" />
    <circle cx="550" cy="180" r="120" fill="#f4efe7" opacity="0.15" />
    <circle cx="750" cy="220" r="100" fill="#f4efe7" opacity="0.1" />
    <circle cx="600" cy="300" r="150" fill="#f4efe7" opacity="0.05" />
  </g>

  <!-- Dissolving geometric cloud -->
  <g>
    <path d="M450 350 L550 250 L750 250 L850 350 L750 450 L550 450 Z" stroke="#a4ff00" stroke-width="2" stroke-dasharray="8 8" opacity="0.6" />
    <path d="M500 350 L550 300 L650 300 L700 350 L650 400 L550 400 Z" fill="#a4ff00" opacity="0.2" />
    
    <!-- Extraction lines -->
    <path d="M600 100 V250" stroke="#a4ff00" stroke-width="1" opacity="0.4" />
    <path d="M600 450 V550" stroke="#a4ff00" stroke-width="1" opacity="0.4" />
    <path d="M300 350 H450" stroke="#a4ff00" stroke-width="1" opacity="0.4" />
    <path d="M850 350 H1000" stroke="#a4ff00" stroke-width="1" opacity="0.4" />

    <!-- Disconnected nodes -->
    <circle cx="600" cy="100" r="4" fill="#a4ff00" />
    <circle cx="600" cy="550" r="4" fill="#a4ff00" />
    <circle cx="300" cy="350" r="4" fill="#a4ff00" />
    <circle cx="1000" cy="350" r="4" fill="#a4ff00" />
  </g>

  <!-- Grounded icons -->
  <g transform="translate(560, 310) scale(2)">
    <path d="M10 10 L30 10 L30 30 L10 30 Z" stroke="#a4ff00" stroke-width="1" fill="none" />
    <circle cx="20" cy="20" r="5" fill="#a4ff00" opacity="0.8" />
  </g>

  <rect width="1200" height="600" filter="url(#grain)" opacity="0.5" pointer-events="none" />
</svg>

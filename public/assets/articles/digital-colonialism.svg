<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.15" />
      </feComponentTransfer>
    </filter>
    <linearGradient id="lebanonGrad" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop stop-color="#172436" />
      <stop offset="1" stop-color="#244000" />
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#lebanonGrad)" />

  <!-- Cedar Tree Abstraction -->
  <g transform="translate(600, 300)" opacity="0.8">
    <path d="M0 -150 L-100 50 L-50 50 L-150 150 L150 150 L50 50 L100 50 Z" fill="#a4ff00" opacity="0.2" stroke="#a4ff00" stroke-width="2" />
    <path d="M0 -100 L-60 20 L-30 20 L-100 100 L100 100 L30 20 L60 20 Z" fill="#a4ff00" opacity="0.4" />
    <rect x="-10" y="150" width="20" height="40" fill="#a4ff00" opacity="0.6" />
  </g>

  <!-- Imperial Circuit Grid -->
  <g opacity="0.3">
    <path d="M100 100 L300 100 L300 300 L500 300" stroke="#a4ff00" stroke-width="1" />
    <path d="M1100 100 L900 100 L900 300 L700 300" stroke="#a4ff00" stroke-width="1" />
    <path d="M100 500 L300 500 L300 300" stroke="#a4ff00" stroke-width="1" />
    <path d="M1100 500 L900 500 L900 300" stroke="#a4ff00" stroke-width="1" />
    
    <circle cx="300" cy="300" r="10" stroke="#a4ff00" stroke-width="1" fill="none" />
    <circle cx="900" cy="300" r="10" stroke="#a4ff00" stroke-width="1" fill="none" />
  </g>

  <!-- Resistance Nodes -->
  <g>
    <circle cx="600" cy="150" r="5" fill="#a4ff00" />
    <circle cx="550" cy="250" r="3" fill="#a4ff00" opacity="0.6" />
    <circle cx="650" cy="250" r="3" fill="#a4ff00" opacity="0.6" />
    <path d="M600 150 L550 250 M600 150 L650 250" stroke="#a4ff00" stroke-width="0.5" opacity="0.5" />
  </g>

  <rect width="1200" height="600" filter="url(#grain)" opacity="0.4" pointer-events="none" />
</svg>

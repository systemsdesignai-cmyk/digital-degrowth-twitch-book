<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.1" />
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="#172436" />

  <!-- Distributed Node Cluster -->
  <g transform="translate(600, 300)">
    <!-- Central Mesh -->
    <circle cx="0" cy="0" r="10" fill="#a4ff00" />
    
    <g opacity="0.6">
      <circle cx="-150" cy="-100" r="8" fill="#a4ff00" />
      <circle cx="150" cy="-100" r="8" fill="#a4ff00" />
      <circle cx="-150" cy="100" r="8" fill="#a4ff00" />
      <circle cx="150" cy="100" r="8" fill="#a4ff00" />
      <circle cx="0" cy="-200" r="6" fill="#a4ff00" />
      <circle cx="0" cy="200" r="6" fill="#a4ff00" />
    </g>

    <!-- Connection Lines -->
    <g stroke="#a4ff00" stroke-width="1" opacity="0.4">
      <path d="M0 0 L-150 -100 M0 0 L150 -100 M0 0 L-150 100 M0 0 L150 100 M0 0 L0 -200 M0 0 L0 200" />
      <path d="M-150 -100 L0 -200 L150 -100 L150 100 L0 200 L-150 100 Z" fill="none" stroke-dasharray="5 5" />
    </g>
    
    <!-- Secondary nodes -->
    <g opacity="0.3">
      <circle cx="-250" cy="0" r="4" fill="#a4ff00" />
      <circle cx="250" cy="0" r="4" fill="#a4ff00" />
      <path d="M-150 -100 L-250 0 M-150 100 L-250 0" stroke="#a4ff00" stroke-width="0.5" />
      <path d="M150 -100 L250 0 M150 100 L250 0" stroke="#a4ff00" stroke-width="0.5" />
    </g>
  </g>

  <!-- Ambient pulse ripples -->
  <circle cx="600" cy="300" r="100" stroke="#a4ff00" stroke-width="0.5" opacity="0.1" />
  <circle cx="600" cy="300" r="200" stroke="#a4ff00" stroke-width="0.5" opacity="0.05" />

  <rect width="1200" height="600" filter="url(#grain)" opacity="0.3" pointer-events="none" />
</svg>
